# heliOS diag image — bare-metal hardware bringup.
#
# Tiny stripped variant used ONLY to diagnose whether a given
# machine can boot any of our kernel images. Distinct from the
# production distro/mkosi.conf so production never gets polluted
# with debug flags or stripped packages.
#
# Differences from production:
#   - No linux-firmware (saves ~1 GB)
#   - No mesa, no XWayland, no foot, no NetworkManager, no bluez
#   - No heliOS userland binaries staged
#   - Verbose kernel cmdline (debug, no quiet, panic-halt, oops-pause)
#   - nomodeset (skip GPU init — uses EFI framebuffer fallback)
#
# Target size: ~250 MB raw, ~80 MB zstd-compressed.
#
# Build (Linux host):
#   cd distro/diag && mkosi --repository-key-fetch=yes --force build
#
# Or via the diag builder:
#   bash distro/diag/build-image.sh

[Distribution]
Distribution=fedora
Release=41
Repositories=fedora,updates

[Output]
Format=disk
Output=helios-diag.raw
ImageId=helios-diag
ImageVersion=0.0.1
CompressOutput=zstd

[Content]
Bootable=yes
Bootloader=systemd-boot
# Verbose cmdline so kernel scrolls everything visible.
# nomodeset/i915.modeset=0 skip GPU init (EFI framebuffer instead).
# panic=0 halts on panic (no auto-reboot) so error stays on screen.
# oops=panic + pause_on_oops=1 forces every Oops to halt the box visibly.
KernelCommandLine=rw console=tty0 debug loglevel=7 earlyprintk=efi,keep printk.devkmsg=on nomodeset i915.modeset=0 panic=0 oops=panic pause_on_oops=1

# Autologin so we land at a shell immediately, no input device needed
# beyond what BIOS supplies.
Password=helios
Autologin=yes

Packages=
        # Boot path
        systemd
        systemd-boot
        kernel-core
        kernel-modules
        # Shell + minimal coreutils
        bash
        coreutils
        util-linux
        # Login plumbing for autologin to TTY1
        util-linux-user
        pam

# No skeleton overlay — diag image carries no heliOS binaries.
# Just kernel + systemd + a shell. If THIS doesn't boot on a
# machine, the machine itself has a problem.

[Validation]
SecureBoot=no

[Runtime]
RAM=2G
KVM=auto
