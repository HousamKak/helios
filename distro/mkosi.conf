# heliOS distro image — Phase 0 baseline.
#
# Builds a bootable disk image based on Fedora 41 with systemd 256+,
# linux-firmware bundled, and the heliOS userland binaries dropped in.
#
# Per docs/research/02-distro-build.md, Phase 0 ships **mutable**;
# A/B + dm-verity (systemd-sysupdate) is Phase 4 work.
#
# Run from a Linux host with mkosi installed:
#   mkosi build           # produce helios.raw
#   mkosi qemu            # boot it in QEMU
#   mkosi --force build   # rebuild from clean
#
# Iteration target: < 90 seconds edit-to-boot for compositor changes,
# leveraging --incremental + UKI + virtiofsd. See justfile in the repo
# root.

[Distribution]
Distribution=fedora
Release=41
Repositories=fedora,updates

[Output]
Format=disk
Output=helios.raw
ImageId=helios
ImageVersion=0.0.1
CompressOutput=zstd

[Content]
Bootable=yes
Bootloader=systemd-boot
KernelCommandLine=quiet rw console=tty0

# Dev images: known root password + autologin on tty1 so VBox/QEMU
# users aren't stuck at "fedora login:". Production images will
# remove these and use systemd-creds at first boot instead.
Password=helios
Autologin=yes

Packages=
        systemd
        systemd-boot
        systemd-networkd
        systemd-resolved
        kernel-core
        kernel-modules
        linux-firmware
        # Userland essentials
        bash
        coreutils
        util-linux
        sqlite-libs
        # Wayland + graphics stack (Phase 2 wiring)
        mesa-dri-drivers
        mesa-libEGL
        mesa-libgbm
        wayland-utils
        libinput
        # Default terminal (Phase 2.5) — m-2.5.2 spawns this at compositor
        # startup and exec's helios-shell inside it. foot is fast and
        # Wayland-native; xterm via XWayland is the fallback if foot
        # isn't packaged in a downstream image.
        foot
        # XWayland for legacy apps (Phase 4 wiring)
        xorg-x11-server-Xwayland
        # PAM + login
        util-linux-user
        pam
        # Networking
        NetworkManager
        # Diagnostics tools used during dev
        socat
        strace
        htop
        # Containers / Flatpak (Phase 4 — uncomment when needed)
        # flatpak

# heliOS userland binaries + systemd units — staged into
# mkosi.skeleton/ by distro/build-image.sh before mkosi build.
ExtraTrees=
        mkosi.skeleton/

[Validation]
# Phase 4 will sign UKIs; placeholder for now.
SecureBoot=no

[Runtime]
RAM=4G
VSock=yes
KVM=auto
# Map the host source dir into the guest for fast iteration
RuntimeTrees=../:/mnt/source
