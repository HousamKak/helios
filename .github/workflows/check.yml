name: Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install compositor system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              libwayland-dev \
              libxkbcommon-dev \
              libudev-dev \
              libgbm-dev \
              libegl1-mesa-dev \
              libinput-dev \
              libdrm-dev \
              libpixman-1-dev \
              libseat-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: helios-workspace
      - run: cargo check --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install compositor system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              libwayland-dev \
              libxkbcommon-dev \
              libudev-dev \
              libgbm-dev \
              libegl1-mesa-dev \
              libinput-dev \
              libdrm-dev \
              libpixman-1-dev \
              libseat-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: helios-workspace
      - run: cargo test --workspace --all-targets --no-fail-fast

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install compositor system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              libwayland-dev \
              libxkbcommon-dev \
              libudev-dev \
              libgbm-dev \
              libegl1-mesa-dev \
              libinput-dev \
              libdrm-dev \
              libpixman-1-dev \
              libseat-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: helios-workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
