name: Image

# Image builds are slow (~15-25 min) so this workflow is opt-in:
#   * Triggered manually via `gh workflow run image.yml` or the Actions tab.
#   * Triggered automatically on tag pushes (release artifacts).
# Day-to-day pushes to main go through `check.yml` only.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build heliOS image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: helios-image

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              python3-pip \
              python3-cryptography \
              qemu-system-x86 \
              systemd-container \
              systemd-ukify \
              systemd-boot \
              systemd-boot-efi \
              ovmf \
              squashfs-tools \
              dosfstools \
              e2fsprogs \
              cryptsetup-bin \
              mtools \
              dnf \
              rpm \
              libwayland-dev \
              libxkbcommon-dev \
              libudev-dev \
              libgbm-dev \
              libegl1-mesa-dev \
              libinput-dev \
              libdrm-dev \
              libpixman-1-dev \
              libseat-dev

      - name: Install mkosi from source
        run: |
          # mkosi's PyPI publishing is sporadic; install from upstream
          # git, which always exists. Install system-wide via sudo so
          # both the runner user (for --version checks) and root (for
          # the actual build) can find it on PATH. Otherwise sudo's
          # secure_path ignores ~/.local/bin and bombs with "command
          # not found" at build time.
          git clone --depth 1 https://github.com/systemd/mkosi.git /tmp/mkosi
          sudo pip install --break-system-packages /tmp/mkosi

      - name: Verify mkosi version
        run: mkosi --version

      - name: Build image (cargo + stage + mkosi)
        # Single source of truth — distro/build-image.sh does cargo
        # build, staging into mkosi.skeleton/, and mkosi build with
        # --repository-key-fetch=yes. Same script the server uses.
        #
        # `sudo env "PATH=$PATH"` preserves the runner's PATH (which
        # contains ~/.cargo/bin from the rustup action) past sudo's
        # secure_path. Required so cargo is found when the script runs.
        run: sudo env "PATH=$PATH" bash distro/build-image.sh

      - name: Verify image
        run: |
          # mkosi produces:
          #   helios.raw            symlink → helios.raw.raw.zst
          #   helios.raw.raw.zst    compressed btrfs disk image
          #   helios.raw.efi        UKI (PE32+ EFI binary)
          #   helios.raw.vmlinuz    raw kernel
          #   helios.raw.initrd     compressed initrd
          ls -lh distro/helios.raw* 2>/dev/null
          file distro/helios.raw.raw.zst
          # Follow the symlink with `stat -L`.
          size_bytes=$(stat -Lc%s distro/helios.raw.raw.zst)
          echo "compressed image size: $size_bytes bytes"
          if [ "$size_bytes" -lt $((50 * 1024 * 1024)) ]; then
              echo "image is suspiciously small" >&2
              exit 1
          fi

      # On tag push: stage files under a release-friendly name and attach
      # them to a GitHub Release. Releases don't count against the Actions
      # storage cap, so we no longer fill up storage with 1+ GB images.
      - name: Stage release assets (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release-assets
          cp distro/helios.raw.raw.zst "release-assets/helios-${GITHUB_REF_NAME}.raw.zst"
          cp distro/helios.raw.efi      "release-assets/helios-${GITHUB_REF_NAME}.efi"
          cp distro/helios.raw.vmlinuz  "release-assets/helios-${GITHUB_REF_NAME}.vmlinuz"
          cp distro/helios.raw.initrd   "release-assets/helios-${GITHUB_REF_NAME}.initrd"
          ls -lh release-assets/

      - name: Publish release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # `release create` fails if the release already exists; in that
          # case upload --clobber the assets instead so re-running on the
          # same tag is idempotent.
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "heliOS $GITHUB_REF_NAME" \
              --generate-notes \
              release-assets/*
          else
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
          fi

      # On workflow_dispatch: keep an artifact so the manual run is still
      # downloadable from the Actions UI — but with 1-day retention so it
      # auto-expires before another run piles on.
      - name: Upload image artifact (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: helios-image-${{ github.sha }}
          # Include the disk image plus the UKI / kernel / initrd so
          # downstream consumers can boot in QEMU without the disk
          # image (e.g. `qemu-system-x86_64 -kernel helios.raw.vmlinuz
          # -initrd helios.raw.initrd`).
          path: |
            distro/helios.raw.raw.zst
            distro/helios.raw.efi
            distro/helios.raw.vmlinuz
            distro/helios.raw.initrd
          retention-days: 1
          compression-level: 0
          if-no-files-found: error
