name: Image

# Image builds are slow (~15-25 min) so this workflow is opt-in:
#   * Triggered manually via `gh workflow run image.yml` or the Actions tab.
#   * Triggered automatically on tag pushes (release artifacts).
# Day-to-day pushes to main go through `check.yml` only.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build heliOS image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: helios-image

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              python3-pip \
              python3-cryptography \
              qemu-system-x86 \
              systemd-container \
              systemd-ukify \
              systemd-boot \
              systemd-boot-efi \
              ovmf \
              squashfs-tools \
              dosfstools \
              e2fsprogs \
              cryptsetup-bin \
              dnf \
              rpm

      - name: Install mkosi from source
        run: |
          # mkosi's PyPI publishing is sporadic; install from upstream
          # git, which always exists. Install system-wide via sudo so
          # both the runner user (for --version checks) and root (for
          # the actual build) can find it on PATH. Otherwise sudo's
          # secure_path ignores ~/.local/bin and bombs with "command
          # not found" at build time.
          git clone --depth 1 https://github.com/systemd/mkosi.git /tmp/mkosi
          sudo pip install --break-system-packages /tmp/mkosi

      - name: Verify mkosi version
        run: mkosi --version

      - name: Build image (cargo + stage + mkosi)
        # Single source of truth — distro/build-image.sh does cargo
        # build, staging into mkosi.skeleton/, and mkosi build with
        # --repository-key-fetch=yes (needed on Ubuntu host where the
        # RPM keyring lacks Fedora keys). Same script the server uses,
        # so CI and bare-metal converge on one path.
        # sudo because mkosi v25+ needs root for systemd-nsresourced
        # sandboxing on unprivileged runners.
        run: sudo bash distro/build-image.sh

      - name: Verify image
        run: |
          ls -lh distro/helios.raw
          file distro/helios.raw
          size_bytes=$(stat -c%s distro/helios.raw)
          echo "image size: $size_bytes bytes"
          # Sanity: image should be at least 100 MB.
          if [ "$size_bytes" -lt $((100 * 1024 * 1024)) ]; then
              echo "image is suspiciously small" >&2
              exit 1
          fi

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: helios-image-${{ github.sha }}
          path: distro/helios.raw
          retention-days: 7
          compression-level: 0
